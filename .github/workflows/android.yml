name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: |
        # 1. 解码密钥库文件: 
        #    将 secrets.STORE_FILE (Base64内容) 解码并保存为 .jks 文件。
        #    !! 重要 !!: 请确保下面的 'app/keystore/demokeystore.jks' 路径
        #               与您 app/build.gradle 文件中 signingConfigs.release.storeFile 配置的路径完全一致！
        #               如果路径不一致，请修改这里或修改 build.gradle 文件。
        mkdir -p app/keystore # 确保目录存在 (如果需要)
        echo "${{ secrets.STORE_FILE }}" | base64 --decode > app/keystore/demokeystore.jks

        # 2. 导出密码和别名环境变量，供 Gradle 使用
        export storePassword=${{ secrets.STORE_PASSWORD }}
        export keyAlias=${{ secrets.KEY_ALIAS }}
        export keyPassword=${{ secrets.KEY_PASSWORD }}
        # 密钥库文件已创建，不再需要导出 Base64 字符串
        # export storeFile=${{ secrets.STORE_FILE }} 

        # 3. 运行 Gradle 构建命令
        ./gradlew assembleFullRelease

    - name: Archive production artifacts
      uses: actions/upload-artifact@v4
      with:
        name: aaps
        path: app/build/outputs/apk/full/release
